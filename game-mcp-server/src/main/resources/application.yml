spring:
  application:
    name: game-mcp-server

  # MCP Server 配置
  ai:
    mcp:
      server:
        name: game-data-mcp-server
        version: 1.0.0

  # 数据库配置（示例用 H2，替换为你的实际数据库）
  datasource:
    url: jdbc:h2:file:./data/gamedb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

  # 如果用 MySQL，替换为：
  # datasource:
  #   url: jdbc:mysql://localhost:3306/game_db?useUnicode=true&characterEncoding=utf8
  #   driver-class-name: com.mysql.cj.jdbc.Driver
  #   username: root
  #   password: your_password

server:
  port: 8081
